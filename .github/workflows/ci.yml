name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build and Start Services with Docker Compose
        run: |
          docker compose up -d --build

      - name: Verify Backend Service
        run: |
          # Wait up to 30 seconds for the backend to start and return 200 OK on /docs
          for i in {1..30}; do
            if curl -s http://localhost:8000/docs > /dev/null; then
              echo "Backend is up and running!"
              exit 0
            fi
            echo "Waiting for backend..."
            sleep 1
          done
          echo "Backend failed to start"
          docker compose logs backend
          exit 1

      - name: Verify Frontend Service
        run: |
          # Wait up to 15 seconds for the frontend (Nginx) to start
          for i in {1..15}; do
            if curl -s http://localhost > /dev/null; then
              echo "Frontend is up and running!"
              exit 0
            fi
            echo "Waiting for frontend..."
            sleep 1
          done
          echo "Frontend failed to start"
          docker compose logs frontend
          exit 1

      - name: Stop Services
        if: always()
        run: docker compose down
